name: Update Scryfall OTags

on:
  schedule:
    - cron: '0 4 * * 1'   # Every Monday at 04:00 UTC
  workflow_dispatch:        # Also runnable manually from the Actions tab

permissions:
  contents: write           # Needed to commit the updated JSON back to the repo

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # fetch() is built-in from Node 18+; no npm install needed

      - name: Fetch OTags from Scryfall
        run: node scripts/update-otags.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/otags.json
          git diff --staged --quiet \
            && echo "No changes to commit." \
            || git commit -m "chore: update otags [skip ci]"
          git push
